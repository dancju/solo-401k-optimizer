<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solo 401(k) S-Corp Optimizer (2026)</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 1rem; }
    #app { max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>
  <main id="app">
    <header><h1>Solo 401(k) S-Corp Optimizer (2026)</h1></header>
    <p id="boot-msg">Loading…</p>
  </main>

  <script src="vendor/d3-sankey-bundle.min.js"></script>
  <script src="vendor/yalps.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const p = document.querySelector('#boot-msg');
      const ok =
        typeof YALPS === 'object' &&
        typeof YALPS.solve === 'function' &&
        typeof d3 === 'object' &&
        typeof d3.sankey === 'function';
      if (p) {
        p.textContent = ok
          ? `Vendors loaded \u2713 YALPS.solve=${typeof YALPS.solve}, d3.sankey=${typeof d3.sankey}`
          : `Vendor load FAILED: YALPS=${typeof YALPS}, d3=${typeof d3}, d3.sankey=${typeof d3?.sankey}`;
        if (!ok) p.style.color = 'red';
      }
    });
  </script>
</body>
</html>
