name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch vendor libraries (pinned versions)
        run: |
          mkdir -p vendor
          curl -fsSL https://unpkg.com/yalps@0.6.4/dist/index.min.js          -o vendor/yalps.min.js
          curl -fsSL https://unpkg.com/d3-selection@3.0.0/dist/d3-selection.min.js -o vendor/d3-selection.min.js
          curl -fsSL https://unpkg.com/d3-array@3.2.4/dist/d3-array.min.js     -o vendor/d3-array.min.js
          curl -fsSL https://unpkg.com/d3-path@3.1.0/dist/d3-path.min.js       -o vendor/d3-path.min.js
          curl -fsSL https://unpkg.com/d3-shape@3.2.0/dist/d3-shape.min.js     -o vendor/d3-shape.min.js
          curl -fsSL https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js  -o vendor/d3-sankey.min.js
          cat vendor/d3-selection.min.js vendor/d3-array.min.js \
              vendor/d3-path.min.js vendor/d3-shape.min.js \
              vendor/d3-sankey.min.js > vendor/d3-sankey-bundle.min.js
          test "$(wc -c < vendor/yalps.min.js)" = "9910" || { echo "YALPS size mismatch"; exit 1; }

      - name: Build single-file dist
        run: bash scripts/build.sh

      - name: Verify dist contains test harness
        run: |
          grep -q "TestHarness" dist/index.html
          grep -q "const GROUND_TRUTH" dist/index.html
          test -s dist/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
